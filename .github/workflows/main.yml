script: |
  set -e

  echo "🚀 Connected to VPS"

  cd ~/mankathaspeices/mankatha-spices/backend || exit 1

  echo "📂 Current directory:"
  pwd

  echo "📂 Git status:"
  git status

  echo "📥 Pulling latest code..."
  git fetch origin
  git reset --hard origin/main

  echo "📦 Checking Node..."
  node -v || true

  echo "⚙️ Loading Node via NVM..."
  export NVM_DIR="$HOME/.nvm"
  [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

  nvm use 20

  echo "📦 Installing dependencies..."
  npm install

  echo "🗄️ Running seed..."
  npm run seed:users || true

  echo "🚀 Restarting PM2..."

  pm2 describe mankatha-backend > /dev/null

  if [ $? -eq 0 ]; then
    pm2 restart mankatha-backend
  else
    pm2 start server.js --name mankatha-backend
  fi

  pm2 save

  echo "✅ Deployment completed"
