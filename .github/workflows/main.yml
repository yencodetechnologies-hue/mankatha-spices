name: Mankatha Backend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Mankatha Server
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: 72.61.236.154
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22

          script: |
            set -e

            cd ~/manakathaspices/mankatha-spices/backend

            echo "📥 Updating project..."
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin
            git reset --hard origin/main

            echo "⚙️ Loading Node..."
            export NVM_DIR="$HOME/.nvm"

            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use 20 || nvm install 20
            elif [ -s "/usr/local/nvm/nvm.sh" ]; then
              . "/usr/local/nvm/nvm.sh"
              nvm use 20 || nvm install 20
            else
              echo "NVM not found; using system node: $(node -v)"
            fi

            echo "🧪 Node Version:"
            node -v

            echo "📦 Installing packages..."
            npm install

            echo "🗄️ Running seed..."
            npm run seed:users || true

            echo "🚀 Restarting PM2..."

            PM2_APP="mankathaspices-api"

            if pm2 describe "$PM2_APP" > /dev/null 2>&1; then
              pm2 restart "$PM2_APP" --update-env
            else
              pm2 start server.js --name "$PM2_APP"
            fi

            echo "💾 Saving PM2..."
            pm2 save

            echo "🔍 Verifying backend..."
            sleep 3

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/api/)

            echo "HTTP Response: $HTTP_CODE"

            if [ "$HTTP_CODE" = "000" ]; then
              echo "⚠️ Backend reachable check skipped"
            fi

            echo "📋 PM2 Status:"
            pm2 list

            echo "✅ Deployment Finished"
